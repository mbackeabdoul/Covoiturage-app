<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajouter un véhicule</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

<header class="h-16 bg-white border-b border-gray-200 flex items-center px-6 md:px-12">
  <a href="dashboard.html" class="text-lg font-semibold text-gray-900">Covoiturage</a>
</header>

<main class="flex justify-center py-16 px-6">
  <div class="w-full max-w-md bg-white border border-gray-200 p-8">
    <a href="vehicules.html" class="text-sm text-gray-500 hover:text-gray-900 mb-4 inline-block"> Mes véhicules</a>
    <div class="text-xl font-semibold text-gray-900 mb-6">Ajouter un véhicule</div>
    <label class="text-sm font-medium text-gray-900 block mb-1">Modèle</label>
    <input class="w-full h-11 border border-gray-200 px-4 text-sm mb-4" placeholder="ex: Toyota Yaris" />
    <label class="text-sm font-medium text-gray-900 block mb-1">Immatriculation</label>
    <input class="w-full h-11 border border-gray-200 px-4 text-sm mb-4" />
    <label class="text-sm font-medium text-gray-900 block mb-1">Nombre de places</label>
    <input class="w-full h-11 border border-gray-200 px-4 text-sm mb-6" />
    <a href="vehicules.html" class="block w-full h-11 flex items-center justify-center bg-gray-900 text-white text-sm font-medium">Enregistrer le véhicule</a>
  </div>
</main>

</body>
</html>
